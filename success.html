<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote Request Sent | Cloud Cleaning Services</title>
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#0f93fe">
  <style>
    :root {
      --ink: #242323;
      --deep: #053155;
      --teal: #0f93fe;
      --paper: #f7fbff;
      --white: #ffffff;
      --muted: #5f6360;
      --line: rgba(21, 33, 36, 0.13);
      --gold: #ffcb05;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(247, 251, 255, 0.98), rgba(247, 251, 255, 0.78)),
        url("assets/austin-living-room-cleaning-cozy-modern.jpg.png") center / cover;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }

    a { color: inherit; text-decoration: none; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.75rem max(1rem, 5vw);
      color: var(--white);
      background: var(--deep);
      font-size: 0.92rem;
      font-weight: 800;
    }

    .topbar a { color: #afdBff; }

    main {
      display: grid;
      place-items: center;
      min-height: calc(100vh - 3.2rem);
      padding: clamp(2rem, 6vw, 5rem) max(1rem, 5vw);
    }

    .confirmation {
      width: min(100%, 42rem);
      padding: clamp(1.4rem, 4vw, 2.4rem);
      border: 1px solid rgba(255, 255, 255, 0.76);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 22px 58px rgba(21, 33, 36, 0.13);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      margin: 0 0 0.9rem;
      color: var(--deep);
      font-size: 0.8rem;
      font-weight: 950;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 2rem;
      height: 0.16rem;
      background: var(--gold);
    }

    h1 {
      margin: 0;
      color: var(--deep);
      font-size: clamp(2.2rem, 6vw, 4rem);
      line-height: 1.04;
      letter-spacing: 0;
    }

    p {
      margin: 1rem 0 0;
      color: var(--muted);
      font-size: 1.08rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-top: 1.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.9rem;
      padding: 0.78rem 1rem;
      border-radius: 8px;
      font-weight: 900;
      line-height: 1;
    }

    .btn-primary {
      color: var(--deep);
      background: var(--gold);
      box-shadow: 0 14px 26px rgba(255, 203, 5, 0.28);
    }

    .btn-light {
      color: var(--deep);
      background: var(--white);
      border: 1px solid var(--line);
    }
  </style>
</head>
<body>
  <header class="topbar">
    <span>Cloud Cleaning Services</span>
    <a href="mailto:cloudcleanexperience@gmail.com">cloudcleanexperience@gmail.com</a>
  </header>

  <main>
    <section class="confirmation" aria-labelledby="success-title">
      <p class="eyebrow">Request received</p>
      <h1 id="success-title">Thank you for requesting a quote.</h1>
      <p>Your cleaning quote request was sent to Cloud Cleaning Services. The team will follow up with timing, scope, and next steps.</p>
      <div class="actions">
        <a class="btn btn-primary" href="/">Back to Home</a>
        <a class="btn btn-light" href="tel:+15124860448">Call or Text 512-486-0448</a>
      </div>
    </section>
  </main>
</body>
</html>
